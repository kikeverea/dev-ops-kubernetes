<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps with Kubernetes</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #ffffff;
            background:
                    radial-gradient(circle at top left, #326ce5 0%, transparent 35%),
                    linear-gradient(135deg, #111827, #0f172a);
        }

        .container {
            width: min(1100px, 90%);
            margin: 0 auto;
        }

        .info {
            display: flex;
            gap: 64px;
            align-items: center;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0;
        }

        nav a {
            margin-left: 24px;
            color: #dbeafe;
            text-decoration: none;
        }

        nav a:hover {
            color: #ffffff;
        }

        main {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            min-height: calc(100vh - 90px);
            gap: 60px;
            padding: 60px 0;
        }

        .badge {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            color: #bfdbfe;
            background: rgba(255, 255, 255, 0.08);
        }

        h1 {
            max-width: 700px;
            margin-bottom: 24px;
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.95;
        }

        h1 span {
            color: #60a5fa;
        }

        .kubernetes-logo {
            display: grid;
            width: 260px;
            height: 260px;
            place-items: center;
            border-radius: 50%;
            font-size: 10rem;
            background: #326ce5;
            box-shadow: 0 0 50px rgba(50, 108, 229, 0.45);
        }

        .feature h2 {
            margin-bottom: 6px;
            font-size: 1rem;
        }

        .feature p {
            color: #94a3b8;
            line-height: 1.5;
        }

        @media (max-width: 800px) {
            nav {
                display: none;
            }

            main {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 3.5rem;
            }
        }
    </style>
</head>

<body>

<main class="container">
    <section id="about">
        <div class="info">
            <div>
                <h1>
                    DevOps with
                    <span>Kubernetes</span>
                </h1>
            </div>
            <div>
                <div class="kubernetes-logo">☸</div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
